# P0 smoke — authed 5-tab shell. Requires a signed-in session (run
# p0-login.yaml first). Verifies: all 5 tabs render and switch, header
# actions reachable, Rentals/Wall/Events/Profile roots paint.
appId: com.kinlo.app
---
- launchApp:
    clearState: false
- repeat:
    while:
      visible: "Dismiss"
    commands:
      - tapOn: "Dismiss"

# Home tab root paints (greeting screen)
- extendedWaitUntil:
    visible: "QUICK ACTIONS"
    timeout: 120000
# Let the transient push-token toast clear so it can't intercept tab taps.
- extendedWaitUntil:
    notVisible: "Error registering push token"
    timeout: 15000
    optional: true
# Wall (Feed un-orphaned)
- tapOn:
    id: "tab-wall"
- extendedWaitUntil:
    visible: "Create a post|Follow people|Wall"
    timeout: 15000
# Events (MyEvents un-orphaned)
- tapOn:
    id: "tab-events"
- extendedWaitUntil:
    visible: "Joined|Hosting|My Events|Events"
    timeout: 15000
# Services (Marketplace) — the real 4th tab (id: tab-services, not tab-rentals).
- tapOn:
    id: "tab-services"
- extendedWaitUntil:
    visible: "Marketplace|Services near you"
    timeout: 15000
# Profile is a pushed Stack screen reached from the header, NOT a tab.
- tapOn:
    id: "header-profile"
- extendedWaitUntil:
    visible: "ACCOUNT"
    timeout: 15000
# Account card rows (Settings entry verified visually; Touchable label
# grouping makes exact text matching flaky on iOS)
- assertVisible: "My memberships"
# Host Mode (§1.3): the single mode control is on ProfileScreen (host-capable
# accounts). Toggle to Hosting → Events root becomes Manage → back.
- tapOn:
    id: "profile-mode-hosting"
- tapOn:
    id: "profile-back"
- tapOn:
    id: "tab-events"
- extendedWaitUntil:
    visible: "Create event"
    timeout: 15000
- assertVisible: "Your events"
- tapOn:
    id: "header-profile"
- tapOn:
    id: "profile-mode-attending"
- tapOn:
    id: "profile-back"
- tapOn:
    id: "tab-events"
- extendedWaitUntil:
    visible: "Joined|Hosting|My Events"
    timeout: 15000
# Notifications live INSIDE the Messages/Inbox hub (BUG 13) — no header bell.
# header-messages → Inbox → tap the Notifications row.
- tapOn:
    id: "header-messages"
- tapOn:
    text: "Notifications"
