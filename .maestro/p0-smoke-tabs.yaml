# P0 smoke — authed 5-tab shell. Requires a signed-in session (run
# p0-login.yaml first). Verifies: all 5 tabs render and switch, header
# actions reachable, Rentals/Wall/Events/Profile roots paint.
appId: com.bondvibe.app
---
- launchApp:
    clearState: false
- repeat:
    while:
      visible: "Dismiss"
    commands:
      - tapOn: "Dismiss"

# Home tab root paints (greeting screen)
- extendedWaitUntil:
    visible: "QUICK ACTIONS"
    timeout: 120000
# Let the transient push-token toast clear so it can't intercept tab taps.
- extendedWaitUntil:
    notVisible: "Error registering push token"
    timeout: 15000
    optional: true
# Wall (Feed un-orphaned)
- tapOn:
    id: "tab-wall"
- extendedWaitUntil:
    visible: "Create a post|Follow people|Wall"
    timeout: 15000
# Events (MyEvents un-orphaned)
- tapOn:
    id: "tab-events"
- extendedWaitUntil:
    visible: "Joined|Hosting|My Events|Events"
    timeout: 15000
# Rentals (un-buried, tab pillar)
- tapOn:
    id: "tab-rentals"
- assertVisible: "Get around 🛴"
# Profile (slim hub with Settings entry)
- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    visible: "ACCOUNT"
    timeout: 15000
# Account card rows (Settings entry verified visually; Touchable label
# grouping makes exact text matching flaky on iOS)
- assertVisible: "My memberships"
# Host Mode (§1.3): toggle swaps the Events tab root to Manage and back
- tapOn:
    id: "mode-hosting"
- tapOn:
    id: "tab-events"
- extendedWaitUntil:
    visible: "Create event"
    timeout: 15000
- assertVisible: "Your events"
- tapOn:
    id: "mode-attending"
- extendedWaitUntil:
    visible: "Joined|Hosting|My Events"
    timeout: 15000
# Header bell → Notifications (un-orphaned, reachable from any tab)
- tapOn:
    id: "header-notifications"
