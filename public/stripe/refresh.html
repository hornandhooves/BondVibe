<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/brand.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Expired - BondVibe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .emoji { font-size: 80px; margin-bottom: 24px; }
    h1 { font-size: 28px; margin-bottom: 16px; font-weight: 700; }
    p { font-size: 16px; color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 32px; }
    .button {
      display: inline-block;
      background: rgba(236, 72, 153, 0.3);
      border: 2px solid rgba(236, 72, 153, 0.6);
      color: #EC4899;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s;
    }
    .button:hover { background: rgba(236, 72, 153, 0.4); }
    .note { font-size: 14px; color: rgba(255,255,255,0.5); margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">🔄</div>
    <h1>Session Expired</h1>
    <p>Your setup session has expired. Returning you to the BondVibe app so you can try again…</p>
    <a href="kinlo://stripe/refresh" class="button">Open BondVibe App</a>
    <p class="note">If you're not redirected automatically, tap the button above or close this tab and reopen the app.</p>
  </div>
  <script>
    // Auto-return to the app (intercepted by openAuthSessionAsync).
    (function () {
      var deepLink = "kinlo://stripe/refresh";
      setTimeout(function () {
        window.location.href = deepLink;
      }, 400);
    })();
  </script>
</body>
</html>
