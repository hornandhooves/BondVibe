<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinlo Plus</title>
  <link rel="stylesheet" href="brand.css" />
</head>
<body class="k-shell">
  <div class="k-lang" role="group" aria-label="Language">
    <button type="button" data-lang="es">ES</button>
    <button type="button" data-lang="en">EN</button>
  </div>

  <div class="k-wrap">
    <div class="k-logo">
      <svg viewBox="0 0 48 48" width="26" height="26" fill="none" stroke="#7C3AED" stroke-width="2.8" stroke-linecap="round">
        <path d="M18 13 A 13 13 0 0 0 18 35"></path>
        <path d="M30 13 A 13 13 0 0 1 30 35"></path>
        <circle cx="24" cy="24" r="3.2" fill="#7C3AED" stroke="none"></circle>
      </svg>
      <span class="k-wm">Kinlo</span>
    </div>

    <div class="k-card">
      <div class="k-body top">
        <div class="k-tile">
          <svg viewBox="0 0 24 24">
            <path d="M12 3l1.9 4.6L18.5 9l-4.6 1.4L12 15l-1.9-4.6L5.5 9l4.6-1.4L12 3z"></path>
            <path d="M19 14l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8.8-2z"></path>
          </svg>
        </div>
        <div class="k-eyebrow mt-18" id="eyebrow"></div>
        <h1 class="k-title mt-6" id="title"></h1>
        <p class="k-msg mt-9" id="msg"></p>
        <a class="k-btn k-btn-block mt-22" href="kinlo://" id="btn"></a>
        <p class="k-note mt-14" id="hint"></p>
      </div>
    </div>
  </div>

  <script>
    var DICT = {
      es: {
        eyebrow: "Kinlo Plus",
        title: "Ya tienes Kinlo Plus", msg: "Tu suscripción a Kinlo Plus está activa. Vuelve a la app: tus funciones Plus se desbloquean automáticamente.",
        btn: "Volver a la app", hint: "Puedes gestionar o cancelar cuando quieras desde Kinlo Plus → Gestionar suscripción.",
        eyebrow_cancel: "Kinlo Plus",
        title_cancel: "Compra cancelada", msg_cancel: "No se hizo ningún cargo. Vuelve a la app y hazte Plus cuando quieras.", hint_cancel: ""
      },
      en: {
        eyebrow: "Kinlo Plus",
        title: "You're on Kinlo Plus", msg: "Your Kinlo Plus subscription is active. Head back to the app: your Plus features unlock automatically.",
        btn: "Return to app", hint: "You can manage or cancel anytime from Kinlo Plus → Manage subscription.",
        eyebrow_cancel: "Kinlo Plus",
        title_cancel: "Checkout cancelled", msg_cancel: "No charge was made. Return to the app and go Plus whenever you're ready.", hint_cancel: ""
      }
    };
    var CANCEL = new URLSearchParams(location.search).get('status') === 'cancel';
    var LANG = pickLang();
    function pickLang(){
      var q = new URLSearchParams(location.search).get('lang');
      if (q === 'es' || q === 'en') return q;
      var s = localStorage.getItem('kinlo_lang');
      if (s === 'es' || s === 'en') return s;
      return (navigator.language || 'en').toLowerCase().indexOf('es') === 0 ? 'es' : 'en';
    }
    function t(k){ return (DICT[LANG] && DICT[LANG][k]) || DICT.en[k] || k; }
    function render(){
      var sfx = CANCEL ? '_cancel' : '';
      document.getElementById('eyebrow').textContent = t('eyebrow' + sfx);
      document.getElementById('title').textContent = t('title' + sfx);
      document.getElementById('msg').textContent = t('msg' + sfx);
      document.getElementById('btn').textContent = t('btn');
      var hint = t('hint' + sfx);
      var hintEl = document.getElementById('hint');
      hintEl.textContent = hint; hintEl.style.display = hint ? 'block' : 'none';
    }
    function syncLang(){ document.querySelectorAll('.k-lang button').forEach(function(b){ b.classList.toggle('on', b.dataset.lang === LANG); }); document.documentElement.lang = LANG; }
    document.querySelectorAll('.k-lang button').forEach(function(b){ b.addEventListener('click', function(){ LANG = b.dataset.lang; localStorage.setItem('kinlo_lang', LANG); render(); syncLang(); }); });
    render(); syncLang();
  </script>
</body>
</html>
