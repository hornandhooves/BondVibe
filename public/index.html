<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinlo</title>
  <link rel="stylesheet" href="brand.css" />
  <script>
    // Enrutado por parámetro mode (enlaces de acción de Firebase)
    (function(){
      var mode = new URLSearchParams(location.search).get('mode');
      if (mode === 'resetPassword') { location.replace('reset-password.html' + location.search); }
      else if (mode === 'verifyEmail') { location.replace('verify-email.html' + location.search); }
    })();
  </script>
  <style>
    .splash{display:flex;flex-direction:column;align-items:center;text-align:center}
    .mark{width:88px;height:88px;border-radius:26px;background:var(--grad-brand);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
    .brand{font-family:var(--font-display);font-weight:700;font-size:40px;letter-spacing:-1.6px;color:var(--text);margin-top:24px}
    .tag{font-family:var(--font-display);font-weight:500;font-size:13px;letter-spacing:4px;text-transform:uppercase;color:var(--text-3);margin-top:8px}
    .sub{font-size:15px;line-height:1.6;color:var(--text-2);margin-top:16px;max-width:320px}
  </style>
</head>
<body class="k-shell">
  <div class="k-lang" role="group" aria-label="Language">
    <button type="button" data-lang="es">ES</button>
    <button type="button" data-lang="en">EN</button>
  </div>

  <div class="splash">
    <div class="mark">
      <svg viewBox="0 0 48 48" width="52" height="52" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round">
        <path d="M18 13 A 13 13 0 0 0 18 35"></path>
        <path d="M21.5 17.5 A 7 7 0 0 0 21.5 30.5"></path>
        <path d="M30 13 A 13 13 0 0 1 30 35"></path>
        <path d="M26.5 17.5 A 7 7 0 0 1 26.5 30.5"></path>
        <circle cx="24" cy="24" r="3.4" fill="#fff" stroke="none"></circle>
      </svg>
    </div>
    <div class="brand">Kinlo</div>
    <div class="tag" data-k="tag"></div>
    <p class="sub" data-k="sub"></p>
  </div>

  <script>
    var DICT = {
      es: { tag: "Encuentra tu tribu", sub: "Conecta a través de experiencias y eventos que te unen con tu gente." },
      en: { tag: "Find your tribe", sub: "Connect through shared experiences and events that bring your people together." }
    };
    var LANG = pickLang();
    function pickLang(){
      var q = new URLSearchParams(location.search).get('lang');
      if (q === 'es' || q === 'en') return q;
      var s = localStorage.getItem('kinlo_lang');
      if (s === 'es' || s === 'en') return s;
      return (navigator.language || 'en').toLowerCase().indexOf('es') === 0 ? 'es' : 'en';
    }
    function t(k){ return (DICT[LANG] && DICT[LANG][k]) || DICT.en[k] || k; }
    function render(){ document.querySelectorAll('[data-k]').forEach(function(el){ el.textContent = t(el.getAttribute('data-k')); }); }
    function syncLang(){ document.querySelectorAll('.k-lang button').forEach(function(b){ b.classList.toggle('on', b.dataset.lang === LANG); }); document.documentElement.lang = LANG; }
    document.querySelectorAll('.k-lang button').forEach(function(b){ b.addEventListener('click', function(){ LANG = b.dataset.lang; localStorage.setItem('kinlo_lang', LANG); render(); syncLang(); }); });
    render(); syncLang();
  </script>
</body>
</html>
