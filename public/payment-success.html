<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="/brand.css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment · BondVibe</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; display: flex; min-height: 100vh; align-items: center; justify-content: center; margin: 0; background: #0E1117; color: #EDEFF5; text-align: center; }
      .card { max-width: 380px; padding: 32px 24px; }
      .mark { width: 72px; height: 72px; border-radius: 20px; margin: 0 auto 20px; background: linear-gradient(135deg, #7C3AED, #C026D3, #FF3E9A); display: flex; align-items: center; justify-content: center; font-size: 36px; }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { color: #8B93A7; line-height: 1.5; font-size: 15px; }
    </style>
</head>
<body>
    <div class="card">
      <div class="mark">✓</div>
      <h1>Payment complete</h1>
      <p>You can close this window and return to BondVibe. Your spot will appear in the app in a few seconds.</p>
    </div>
</body>
</html>
