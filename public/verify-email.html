<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinlo</title>
  <link rel="stylesheet" href="brand.css" />
</head>
<body class="k-shell">
  <div class="k-lang" role="group" aria-label="Language">
    <button type="button" data-lang="es">ES</button>
    <button type="button" data-lang="en">EN</button>
  </div>

  <div class="k-wrap">
    <div class="k-logo">
      <svg viewBox="0 0 48 48" width="26" height="26" fill="none" stroke="#7C3AED" stroke-width="2.8" stroke-linecap="round">
        <path d="M18 13 A 13 13 0 0 0 18 35"></path>
        <path d="M30 13 A 13 13 0 0 1 30 35"></path>
        <circle cx="24" cy="24" r="3.2" fill="#7C3AED" stroke="none"></circle>
      </svg>
      <span class="k-wm">Kinlo</span>
    </div>

    <div class="k-card">
      <div class="k-banner ph" data-label="Ilustración de marca · 720×380"></div>

      <div class="k-body" id="s-loading">
        <div class="k-chip loading"><span class="k-spin"></span></div>
        <h1 class="k-title mt-18" data-k="loading_title"></h1>
        <p class="k-msg mt-9" data-k="loading_msg"></p>
      </div>

      <div class="k-body" id="s-success" hidden>
        <div class="k-chip success"><svg viewBox="0 0 24 24"><path d="M20 6 L9 17 L4 12"></path></svg></div>
        <h1 class="k-title mt-18" data-k="success_title"></h1>
        <p class="k-msg mt-9" data-k="success_msg"></p>
        <a class="k-btn k-btn-block mt-22" href="kinlo://login" data-k="success_btn"></a>
        <p class="k-note mt-14" data-k="success_note"></p>
      </div>

      <div class="k-body" id="s-expired" hidden>
        <div class="k-chip error"><svg viewBox="0 0 24 24"><path d="M6 6 L18 18 M18 6 L6 18"></path></svg></div>
        <h1 class="k-title mt-18" data-k="expired_title"></h1>
        <p class="k-msg mt-9" data-k="expired_msg"></p>
        <a class="k-btn k-btn-block mt-22" href="kinlo://login" data-k="expired_btn"></a>
        <p class="k-note mt-14" data-k="expired_note"></p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script>
    var DICT = {
      es: {
        loading_title: "Verificando tu correo",
        loading_msg: "Espera un momento mientras confirmamos tu dirección.",
        success_title: "¡Correo verificado!",
        success_msg: "Tu correo quedó confirmado. Abre Kinlo e inicia sesión para empezar a conectar con tu gente.",
        success_btn: "Abrir Kinlo",
        success_note: "Si no ocurre nada, cierra esta pestaña y abre la app Kinlo.",
        expired_title: "Enlace no válido",
        expired_msg: "Este enlace de verificación caducó o ya se usó. Pide uno nuevo desde la app.",
        expired_btn: "Abrir Kinlo",
        expired_note: "Abre la app para solicitar un nuevo correo de verificación.",
        err_expired: "Este enlace caducó. Solicita uno nuevo desde la app.",
        err_invalid: "Este enlace no es válido o ya se usó."
      },
      en: {
        loading_title: "Verifying your email",
        loading_msg: "Hang tight while we confirm your email address.",
        success_title: "Email verified!",
        success_msg: "Your email is confirmed. Open Kinlo and log in to start connecting with your people.",
        success_btn: "Open Kinlo",
        success_note: "If nothing happens, close this tab and open the Kinlo app.",
        expired_title: "Link not valid",
        expired_msg: "This verification link has expired or was already used. Request a new one from the app.",
        expired_btn: "Open Kinlo",
        expired_note: "Open the app to request a new verification email.",
        err_expired: "This link has expired. Request a new one from the app.",
        err_invalid: "This link is invalid or was already used."
      }
    };
    var LANG = pickLang();
    function pickLang(){
      var q = new URLSearchParams(location.search).get('lang');
      if (q === 'es' || q === 'en') return q;
      var s = localStorage.getItem('kinlo_lang');
      if (s === 'es' || s === 'en') return s;
      return (navigator.language || 'en').toLowerCase().indexOf('es') === 0 ? 'es' : 'en';
    }
    function t(k){ return (DICT[LANG] && DICT[LANG][k]) || DICT.en[k] || k; }
    function render(){ document.querySelectorAll('[data-k]').forEach(function(el){ el.textContent = t(el.getAttribute('data-k')); }); }
    function syncLang(){ document.querySelectorAll('.k-lang button').forEach(function(b){ b.classList.toggle('on', b.dataset.lang === LANG); }); document.documentElement.lang = LANG; }
    document.querySelectorAll('.k-lang button').forEach(function(b){ b.addEventListener('click', function(){ LANG = b.dataset.lang; localStorage.setItem('kinlo_lang', LANG); render(); syncLang(); }); });

    function showState(name){ ['loading','success','expired'].forEach(function(s){ document.getElementById('s-'+s).hidden = (s !== name); }); }
    function setExpiredMsg(key){ var el = document.querySelector('#s-expired [data-k="expired_msg"]'); if (el) el.textContent = t(key); }

    var firebaseConfig = {
      apiKey: "AIzaSyDB6h3zbFS5tMBIgVXhAP_a2MrYtjuNixA",
      authDomain: "kinlo-app-dev.firebaseapp.com",
      projectId: "kinlo-app-dev",
      storageBucket: "kinlo-app-dev.firebasestorage.app",
      messagingSenderId: "208504615505",
      appId: "1:208504615505:web:68728addd412218718be70"
    };

    async function init(){
      render(); syncLang();
      var params = new URLSearchParams(location.search);
      var preview = params.get('preview');
      if (preview){ showState(preview === 'error' ? 'expired' : preview); return; }

      showState('loading');
      var oobCode = params.get('oobCode');
      var mode = params.get('mode');
      if (!oobCode){ showState('expired'); return; }
      if (mode === 'resetPassword'){ location.href = 'reset-password.html' + location.search; return; }

      try {
        firebase.initializeApp(firebaseConfig);
        await firebase.auth().applyActionCode(oobCode);
        var user = firebase.auth().currentUser;
        if (user){ await firebase.firestore().collection('users').doc(user.uid).update({ emailVerified: true }); }
        showState('success');
      } catch (error){
        console.error('Verification error:', error);
        if (error.code === 'auth/expired-action-code') setExpiredMsg('err_expired');
        else if (error.code === 'auth/invalid-action-code') setExpiredMsg('err_invalid');
        showState('expired');
      }
    }
    init();
  </script>
</body>
</html>
