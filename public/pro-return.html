<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BondVibe Pro</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0b0710; color: #fff; text-align: center; padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card { max-width: 420px; }
    .mark {
      width: 72px; height: 72px; border-radius: 22px; margin: 0 auto 24px;
      background: linear-gradient(135deg, #7C3AED, #C026D3, #FF3E9A);
      display: flex; align-items: center; justify-content: center; font-size: 34px;
    }
    h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 12px; }
    p { color: #b9b1c6; font-size: 16px; line-height: 1.5; }
    .hint { margin-top: 28px; font-size: 14px; color: #8a8398; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">👑</div>
    <h1 id="title">You're Pro 🎉</h1>
    <p id="msg">Your BondVibe Pro subscription is active. You can close this tab and return to the app — your Pro features unlock automatically.</p>
    <p class="hint">You can manage or cancel anytime from BondVibe Pro → Manage subscription.</p>
  </div>
  <script>
    var status = new URLSearchParams(location.search).get("status");
    if (status === "cancel") {
      document.getElementById("title").textContent = "Checkout cancelled";
      document.getElementById("msg").textContent =
        "No charge was made. You can return to the app and go Pro whenever you're ready.";
    }
  </script>
</body>
</html>
