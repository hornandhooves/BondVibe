<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinlo</title>
  <link rel="stylesheet" href="brand.css" />
  <style>
    .form{padding:26px 32px 34px;text-align:left;display:none}
    .form h1{font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:-.4px;color:var(--text)}
    .form .sub{font-size:13.5px;line-height:1.55;color:var(--text-2);margin-top:6px}
    .err{display:none;background:var(--error-bg);color:var(--error);font-size:13px;font-weight:600;padding:11px 14px;border-radius:12px;margin-top:16px}
    .group{margin-top:16px}
    .group label{display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:7px}
    .field{position:relative}
    .field input{width:100%;padding:13px 46px 13px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font:500 15px/1.2 var(--font-body);outline:none;transition:border-color .15s}
    .field input::placeholder{color:var(--text-3)}
    .field input:focus{border-color:var(--primary)}
    .eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:0;cursor:pointer;padding:8px;display:flex;color:var(--text-3)}
    .eye:hover{color:var(--text-2)}
    .eye svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .reqs{margin-top:18px;padding:15px 16px;background:var(--surface-2);border-radius:12px}
    .reqs-title{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-2);margin-bottom:11px}
    .req{display:flex;align-items:center;gap:10px;font-size:13px;margin-bottom:8px}
    .req:last-child{margin-bottom:0}
    .req-ic{width:18px;height:18px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;background:rgba(42,37,32,.08);color:var(--text-3)}
    .req-tx{color:var(--text-2)}
    .req.valid .req-ic{background:var(--success-bg);color:var(--success)}
    .req.valid .req-tx{color:var(--success)}
  </style>
</head>
<body class="k-shell">
  <div class="k-lang" role="group" aria-label="Language">
    <button type="button" data-lang="es">ES</button>
    <button type="button" data-lang="en">EN</button>
  </div>

  <div class="k-wrap">
    <div class="k-logo">
      <svg viewBox="0 0 48 48" width="26" height="26" fill="none" stroke="#7C3AED" stroke-width="2.8" stroke-linecap="round">
        <path d="M18 13 A 13 13 0 0 0 18 35"></path>
        <path d="M30 13 A 13 13 0 0 1 30 35"></path>
        <circle cx="24" cy="24" r="3.2" fill="#7C3AED" stroke="none"></circle>
      </svg>
      <span class="k-wm">Kinlo</span>
    </div>

    <div class="k-card">
      <div class="k-banner ph" data-label="Ilustración de marca · 720×380"></div>

      <!-- Verificando -->
      <div class="k-body" id="s-loading">
        <div class="k-chip loading"><span class="k-spin"></span></div>
        <h1 class="k-title mt-18" data-k="loading_title"></h1>
        <p class="k-msg mt-9" data-k="loading_msg"></p>
      </div>

      <!-- Enlace no válido -->
      <div class="k-body" id="s-invalid" hidden>
        <div class="k-chip error"><svg viewBox="0 0 24 24"><path d="M6 6 L18 18 M18 6 L6 18"></path></svg></div>
        <h1 class="k-title mt-18" data-k="invalid_title"></h1>
        <p class="k-msg mt-9" data-k="invalid_msg"></p>
        <a class="k-btn k-btn-block mt-22" href="kinlo://login" data-k="invalid_btn"></a>
        <p class="k-note mt-14" data-k="invalid_note"></p>
      </div>

      <!-- Formulario -->
      <div class="form" id="s-form">
        <h1 data-k="form_title"></h1>
        <p class="sub" data-k="form_sub"></p>
        <div class="err" id="errBox"></div>

        <div class="group">
          <label for="pw" data-k="label_pw"></label>
          <div class="field">
            <input type="password" id="pw" autocomplete="new-password" />
            <button type="button" class="eye" aria-label="toggle" onclick="toggle('pw',this)">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <div class="group">
          <label for="cf" data-k="label_confirm"></label>
          <div class="field">
            <input type="password" id="cf" autocomplete="new-password" />
            <button type="button" class="eye" aria-label="toggle" onclick="toggle('cf',this)">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <div class="reqs">
          <div class="reqs-title" data-k="req_title"></div>
          <div class="req" id="r-length"><span class="req-ic">○</span><span class="req-tx" data-k="req_length"></span></div>
          <div class="req" id="r-upper"><span class="req-ic">○</span><span class="req-tx" data-k="req_upper"></span></div>
          <div class="req" id="r-lower"><span class="req-ic">○</span><span class="req-tx" data-k="req_lower"></span></div>
          <div class="req" id="r-number"><span class="req-ic">○</span><span class="req-tx" data-k="req_number"></span></div>
          <div class="req" id="r-special"><span class="req-ic">○</span><span class="req-tx" data-k="req_special"></span></div>
        </div>

        <button class="k-btn k-btn-block" id="submitBtn" style="margin-top:18px" disabled data-k="submit"></button>
      </div>

      <!-- Éxito -->
      <div class="k-body" id="s-success" hidden>
        <div class="k-chip success"><svg viewBox="0 0 24 24"><path d="M20 6 L9 17 L4 12"></path></svg></div>
        <h1 class="k-title mt-18" data-k="success_title"></h1>
        <p class="k-msg mt-9" data-k="success_msg"></p>
        <a class="k-btn k-btn-block mt-22" href="kinlo://login" data-k="success_btn"></a>
        <p class="k-note mt-14" data-k="success_note"></p>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script>
    var DICT = {
      es: {
        loading_title: "Verificando enlace", loading_msg: "Un momento mientras validamos tu enlace.",
        invalid_title: "Enlace no válido", invalid_msg: "Este enlace para restablecer la contraseña caducó o ya se usó. Pide uno nuevo desde la app.",
        invalid_btn: "Abrir Kinlo", invalid_note: "Abre la app para solicitar un nuevo enlace.",
        form_title: "Nueva contraseña", form_sub: "Crea una contraseña segura para tu cuenta.",
        label_pw: "Nueva contraseña", label_confirm: "Confirmar contraseña",
        req_title: "Requisitos", req_length: "Al menos 8 caracteres", req_upper: "Una mayúscula",
        req_lower: "Una minúscula", req_number: "Un número", req_special: "Un carácter especial (!@#$%…)",
        submit: "Restablecer contraseña", submitting: "Restableciendo…",
        err_match: "Las contraseñas no coinciden.", err_generic: "No se pudo restablecer. Inténtalo de nuevo.",
        success_title: "¡Contraseña actualizada!", success_msg: "Tu contraseña se cambió correctamente. Abre Kinlo e inicia sesión con la nueva.",
        success_btn: "Abrir Kinlo", success_note: "Si no ocurre nada, cierra esta pestaña y abre la app Kinlo."
      },
      en: {
        loading_title: "Verifying link", loading_msg: "One moment while we validate your link.",
        invalid_title: "Link not valid", invalid_msg: "This password reset link has expired or was already used. Request a new one from the app.",
        invalid_btn: "Open Kinlo", invalid_note: "Open the app to request a new link.",
        form_title: "New password", form_sub: "Create a secure password for your account.",
        label_pw: "New password", label_confirm: "Confirm password",
        req_title: "Requirements", req_length: "At least 8 characters", req_upper: "One uppercase letter",
        req_lower: "One lowercase letter", req_number: "One number", req_special: "One special character (!@#$%…)",
        submit: "Reset password", submitting: "Resetting…",
        err_match: "Passwords don't match.", err_generic: "Couldn't reset password. Please try again.",
        success_title: "Password updated!", success_msg: "Your password was changed successfully. Open Kinlo and log in with your new password.",
        success_btn: "Open Kinlo", success_note: "If nothing happens, close this tab and open the Kinlo app."
      }
    };
    var LANG = pickLang();
    function pickLang(){
      var q = new URLSearchParams(location.search).get('lang');
      if (q === 'es' || q === 'en') return q;
      var s = localStorage.getItem('kinlo_lang');
      if (s === 'es' || s === 'en') return s;
      return (navigator.language || 'en').toLowerCase().indexOf('es') === 0 ? 'es' : 'en';
    }
    function t(k){ return (DICT[LANG] && DICT[LANG][k]) || DICT.en[k] || k; }
    function render(){
      document.querySelectorAll('[data-k]').forEach(function(el){ el.textContent = t(el.getAttribute('data-k')); });
      document.getElementById('pw').placeholder = t('label_pw');
      document.getElementById('cf').placeholder = t('label_confirm');
    }
    function syncLang(){ document.querySelectorAll('.k-lang button').forEach(function(b){ b.classList.toggle('on', b.dataset.lang === LANG); }); document.documentElement.lang = LANG; }
    document.querySelectorAll('.k-lang button').forEach(function(b){ b.addEventListener('click', function(){ LANG = b.dataset.lang; localStorage.setItem('kinlo_lang', LANG); render(); syncLang(); }); });

    function showSection(name){
      ['loading','invalid','success'].forEach(function(s){ document.getElementById('s-'+s).hidden = (s !== name); });
      document.getElementById('s-form').style.display = (name === 'form') ? 'block' : 'none';
    }

    var pw = document.getElementById('pw'), cf = document.getElementById('cf');
    var submitBtn = document.getElementById('submitBtn'), errBox = document.getElementById('errBox');
    var reqEls = { length:document.getElementById('r-length'), upper:document.getElementById('r-upper'), lower:document.getElementById('r-lower'), number:document.getElementById('r-number'), special:document.getElementById('r-special') };
    var valid = { length:false, upper:false, lower:false, number:false, special:false };

    function validate(p){
      valid.length = p.length >= 8;
      valid.upper = /[A-Z]/.test(p);
      valid.lower = /[a-z]/.test(p);
      valid.number = /[0-9]/.test(p);
      valid.special = /[!@#$%^&*(),.?":{}|<>]/.test(p);
      Object.keys(valid).forEach(function(key){
        var el = reqEls[key];
        el.classList.toggle('valid', valid[key]);
        el.querySelector('.req-ic').textContent = valid[key] ? '✓' : '○';
      });
      return Object.keys(valid).every(function(k){ return valid[k]; });
    }
    function refresh(){
      var allValid = validate(pw.value);
      var match = pw.value === cf.value && cf.value.length > 0;
      submitBtn.disabled = !(allValid && match);
    }
    pw.addEventListener('input', refresh);
    cf.addEventListener('input', refresh);

    function toggle(id, btn){
      var input = document.getElementById(id);
      var svg = btn.querySelector('svg');
      if (input.type === 'password'){
        input.type = 'text';
        svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        input.type = 'password';
        svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    }

    var params = new URLSearchParams(location.search);
    var oobCode = params.get('oobCode');
    var mode = params.get('mode');

    var firebaseConfig = {
      apiKey: "AIzaSyDB6h3zbFS5tMBIgVXhAP_a2MrYtjuNixA",
      authDomain: "kinlo-app-dev.firebaseapp.com",
      projectId: "kinlo-app-dev",
      storageBucket: "kinlo-app-dev.firebasestorage.app",
      messagingSenderId: "208504615505",
      appId: "1:208504615505:web:68728addd412218718be70"
    };

    submitBtn.addEventListener('click', async function(){
      if (pw.value !== cf.value){ errBox.textContent = t('err_match'); errBox.style.display = 'block'; return; }
      submitBtn.disabled = true;
      submitBtn.textContent = t('submitting');
      errBox.style.display = 'none';
      try {
        await firebase.auth().confirmPasswordReset(oobCode, pw.value);
        showSection('success');
      } catch (error){
        console.error('Reset error:', error);
        errBox.textContent = error.message || t('err_generic');
        errBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = t('submit');
      }
    });

    async function init(){
      render(); syncLang();
      var preview = params.get('preview');
      if (preview){ showSection(preview); return; }

      showSection('loading');
      if (!oobCode || mode !== 'resetPassword'){ showSection('invalid'); return; }
      try {
        firebase.initializeApp(firebaseConfig);
        await firebase.auth().verifyPasswordResetCode(oobCode);
        showSection('form');
      } catch (error){
        console.error('Invalid code:', error);
        showSection('invalid');
      }
    }
    init();
  </script>
</body>
</html>
