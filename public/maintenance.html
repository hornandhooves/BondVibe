<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinlo</title>
  <link rel="stylesheet" href="brand.css" />
</head>
<body class="k-shell">
  <div class="k-lang" role="group" aria-label="Language">
    <button type="button" data-lang="es">ES</button>
    <button type="button" data-lang="en">EN</button>
  </div>

  <div class="k-wrap">
    <div class="k-logo">
      <svg viewBox="0 0 48 48" width="26" height="26" fill="none" stroke="#7C3AED" stroke-width="2.8" stroke-linecap="round">
        <path d="M18 13 A 13 13 0 0 0 18 35"></path>
        <path d="M30 13 A 13 13 0 0 1 30 35"></path>
        <circle cx="24" cy="24" r="3.2" fill="#7C3AED" stroke="none"></circle>
      </svg>
      <span class="k-wm">Kinlo</span>
    </div>

    <div class="k-card">
      <div class="k-banner ph" data-label="Ilustración de marca · 720×380"></div>
      <div class="k-body">
        <div class="k-chip" style="color:var(--warning);background:var(--warning-bg)">
          <svg viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L4 17l3 3 5.3-5.3a4 4 0 0 0 5.4-5.4l-2.3 2.3-2.1-.6-.6-2.1 2.0-2.6z"></path></svg>
        </div>
        <div class="k-eyebrow mt-18" data-k="eyebrow"></div>
        <h1 class="k-title mt-6" data-k="title"></h1>
        <p class="k-msg mt-9" data-k="msg"></p>
        <p class="k-note mt-22" data-k="note"></p>
      </div>
    </div>
  </div>

  <script>
    var DICT = {
      es: { eyebrow: "Mantenimiento", title: "Volvemos enseguida", msg: "Estamos afinando algunas cosas en Kinlo para que todo funcione mejor. Vuelve a intentarlo en un rato.", note: "Gracias por tu paciencia — no tardamos." },
      en: { eyebrow: "Maintenance", title: "Back in a moment", msg: "We're tuning a few things in Kinlo so everything runs smoother. Please check back in a little while.", note: "Thanks for your patience — we won't be long." }
    };
    var LANG = pickLang();
    function pickLang(){
      var q = new URLSearchParams(location.search).get('lang');
      if (q === 'es' || q === 'en') return q;
      var s = localStorage.getItem('kinlo_lang');
      if (s === 'es' || s === 'en') return s;
      return (navigator.language || 'en').toLowerCase().indexOf('es') === 0 ? 'es' : 'en';
    }
    function t(k){ return (DICT[LANG] && DICT[LANG][k]) || DICT.en[k] || k; }
    function render(){ document.querySelectorAll('[data-k]').forEach(function(el){ el.textContent = t(el.getAttribute('data-k')); }); }
    function syncLang(){ document.querySelectorAll('.k-lang button').forEach(function(b){ b.classList.toggle('on', b.dataset.lang === LANG); }); document.documentElement.lang = LANG; }
    document.querySelectorAll('.k-lang button').forEach(function(b){ b.addEventListener('click', function(){ LANG = b.dataset.lang; localStorage.setItem('kinlo_lang', LANG); render(); syncLang(); }); });
    render(); syncLang();
  </script>
</body>
</html>
